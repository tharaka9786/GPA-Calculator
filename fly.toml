# fly.toml app configuration file generated for gpa-cal on 2026-06-28T02:41:06+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gpa-cal'
primary_region = 'sin'

[build]

[env]
  PORT = "3000"
  DATABASE_DIR = "/data"

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

